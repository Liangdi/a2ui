[package]
name = "a2ui"
version = "0.1.1"
edition = "2024"
authors = ["Liangdi <wu@liangdi.me>"]
description = "A TUI component library built on top of ratatui"
license = "MIT"
repository = "https://github.com/Liangdi/a2ui"

[dependencies]
ratatui = "0.30.1"
crossterm = "0.29"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
chrono = "0.4"
uuid = { version = "1", features = ["v4"] }
regex = "1"
unicode-width = "0.2"
