[package]
name = "a2ui"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "A TUI component library built on top of ratatui"

[features]
default = []
# Forwarded to the tui backend. Required to build the 14_audio example.
audio = ["a2ui-tui/audio"]

[dependencies]
a2ui-core = { workspace = true }
a2ui-tui = { workspace = true }
# The `a2ui` binary runs the gallery app, so `cargo install a2ui` keeps working
# (mirrors the pre-split behavior where main.rs was the gallery).
a2ui-gallery = { workspace = true }

# Examples directly use these crates (the umbrella only re-exports core+tui).
[dev-dependencies]
ratatui = { workspace = true }
crossterm = { workspace = true }
serde_json = { workspace = true }

[[example]]
name = "13_image"

[[example]]
name = "14_audio"
required-features = ["audio"]
